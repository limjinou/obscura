<html lang="en">

<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #030303;
            --color-text-main: #F4F4F5;
            --color-text-muted: #666666;
            --color-border: rgba(255, 255, 255, 0.12);
            --accent: #FF3300;
            --font-display: 'Oswald', -apple-system, sans-serif;
            --font-sans: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --ease-cinematic: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background-color: var(--color-bg);
            color: var(--color-text-main);
            font-family: var(--font-sans);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Viewport ── */
        #viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ── Background Layer ── */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-color: var(--color-bg);
        }

        .bg-image {
            position: absolute;
            top: -2%;
            left: -2%;
            width: 104%;
            height: 104%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.2s var(--ease-cinematic), transform 4s linear;
            will-change: opacity, transform;
            transform: scale(1.05);
        }

        .bg-image.active {
            opacity: 1;
            transform: scale(1);
        }

        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg,
                    rgba(3, 3, 3, 0.88) 0%,
                    rgba(3, 3, 3, 0.3) 35%,
                    rgba(3, 3, 3, 0.08) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* ── Display Type (large bg text) ── */
        .display-type-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .eyebrow-text {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: -1vw;
            opacity: 0.7;
            color: var(--accent);
            transform: translateY(20px);
            transition: transform 0.8s var(--ease-cinematic), opacity 0.8s var(--ease-cinematic);
        }

        .masking-text {
            font-family: var(--font-display);
            font-size: 18vw;
            font-weight: 700;
            line-height: 0.8;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.07);
            white-space: nowrap;
            transform: translateY(20px) scale(0.98);
            transition: transform 0.8s var(--ease-cinematic), opacity 0.8s var(--ease-cinematic), letter-spacing 0.8s var(--ease-cinematic);
        }

        .masking-text.animate-in {
            transform: translateY(0) scale(1);
            letter-spacing: -0.04em;
        }

        .eyebrow-text.animate-in {
            transform: translateY(0);
        }

        /* ── UI Layer ── */
        .ui-layer {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0 3rem 2.5rem;
            pointer-events: none;
        }

        .ui-layer>* {
            pointer-events: auto;
        }

        /* ── Nav ── */
        .site-nav {
            position: relative;
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0;
            flex-shrink: 0;
        }

        .site-nav-logo {
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .site-nav-divider {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
            margin: 0 2rem;
            min-width: 32px;
        }

        .site-nav-links {
            display: flex;
            align-items: center;
            gap: 0;
            list-style: none;
            flex-shrink: 0;
        }

        .site-nav-links li {
            display: flex;
            align-items: center;
        }

        .site-nav-links li+li::before {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
            margin: 0 1.5rem;
        }

        .site-nav-links a {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--color-text-main);
            text-decoration: none;
            transition: color 0.25s ease;
            white-space: nowrap;
            opacity: 0.6;
        }

        .site-nav-links a:hover,
        .site-nav-links a.active {
            color: var(--accent);
            opacity: 1;
        }

        /* ── Archive Table ── */
        .archive-container {
            width: 100%;
            max-height: 52vh;
            display: flex;
            flex-direction: column;
        }

        .archive-header {
            display: grid;
            grid-template-columns: 0.5fr 3fr 1fr 1fr 1.5fr 0.5fr;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            color: var(--color-text-muted);
            text-transform: uppercase;
            font-family: var(--font-mono);
            font-weight: 400;
        }

        .archive-list {
            list-style: none;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .archive-list::-webkit-scrollbar {
            display: none;
        }

        .archive-item {
            display: grid;
            grid-template-columns: 0.5fr 3fr 1fr 1fr 1.5fr 0.5fr;
            align-items: center;
            padding: 1.1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition:
                background-color 0.3s ease,
                padding-left 0.4s var(--ease-cinematic),
                border-bottom-color 0.3s ease;
        }

        .archive-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            padding-left: 0.75rem;
            border-bottom-color: rgba(255, 51, 0, 0.25);
        }

        .col {
            font-size: 0.85rem;
            font-weight: 400;
        }

        .col-id {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--color-text-muted);
            letter-spacing: 0.05em;
        }

        .col-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            transition: color 0.3s ease;
            color: rgba(255, 255, 255, 0.85);
        }

        .col-cat {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-text-muted);
        }

        .col-year {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--color-text-muted);
        }

        .col-format {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
        }

        /* col-meta: mobile-only, hidden on desktop */
        .col-meta {
            display: none;
        }

        /* Ensure desktop grid columns are properly shown */
        .col-cat, .col-year, .col-format {
            display: block;
        }

        .col-action {
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.4s var(--ease-cinematic);
        }

        .archive-item:hover .col-action {
            opacity: 1;
            transform: translateX(0);
        }

        .archive-item:hover .col-title {
            color: #fff;
        }

        .archive-item:hover .col-cat {
            color: var(--accent);
        }

        .icon-arrow-circle {
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 51, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .icon-arrow-circle svg {
            width: 11px;
            height: 11px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: square;
        }

        /* ── Grain Overlay ── */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* ── Category Filter Bar ── */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 1.25rem;
        }

        .filter-btn {
            font-family: var(--font-mono);
            font-size: 0.58rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.35rem 0;
            margin-right: 2rem;
            border-bottom: 1px solid transparent;
            transition: color 0.25s ease, border-color 0.25s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            color: var(--color-text-main);
            border-bottom-color: var(--accent);
        }

        /* ── Row count label ── */
        .archive-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .archive-count {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            color: var(--color-text-muted);
            text-transform: uppercase;
        }

        /* ── Mobile / Tablet ── */
        @media (max-width: 768px) {
            /* Hide center overlay text — bg image does the job */
            .display-type-container {
                display: none;
            }

            /* Stronger gradient so list text is always readable */
            .bg-gradient {
                background: linear-gradient(0deg,
                    rgba(3, 3, 3, 0.92) 0%,
                    rgba(3, 3, 3, 0.55) 50%,
                    rgba(3, 3, 3, 0.15) 100%);
            }

            body, html {
                /* Use dynamic viewport height to account for mobile browser chrome */
                height: 100dvh;
            }

            #viewport {
                height: 100dvh;
            }

            .ui-layer {
                padding: 0 1.25rem env(safe-area-inset-bottom, 1.5rem);
                padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
            }

            .archive-container {
                /* Fill remaining space below nav */
                flex: 1;
                max-height: none;
                min-height: 0;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            .archive-list {
                flex: 1;
                min-height: 0;
                -webkit-overflow-scrolling: touch;
            }

            .archive-header {
                display: none;
            }

            .archive-item {
                grid-template-columns: 1fr auto;
                grid-template-rows: auto auto;
                gap: 0.3rem;
                padding: 1rem 0;
                /* No hover shift on touch */
                transition: background-color 0.2s ease, border-bottom-color 0.2s ease;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }

            .archive-item.touch-active {
                background-color: rgba(255, 255, 255, 0.04);
                border-bottom-color: rgba(255, 51, 0, 0.3);
            }

            .col-id {
                display: none;
            }

            .col-title {
                grid-column: 1 / 2;
                grid-row: 1 / 2;
                font-size: 1.2rem;
            }

            /* Hide individual cols — replaced by col-meta */
            .col-cat,
            .col-year,
            .col-format {
                display: none;
            }

            .col-meta {
                display: block;
                grid-column: 1 / 2;
                grid-row: 2 / 3;
                font-family: var(--font-mono);
                font-size: 0.58rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--color-text-muted);
            }

            /* Arrow always visible on touch */
            .col-action {
                grid-column: 2 / 3;
                grid-row: 1 / 3;
                align-self: center;
                opacity: 1;
                transform: none;
            }

            .icon-arrow-circle {
                width: 34px;
                height: 34px;
            }

            .masking-text {
                font-size: 26vw;
            }

            /* Filter bar: single-row horizontal scroll */
            .filter-bar {
                flex-wrap: nowrap;
                overflow-x: auto;
                overflow-y: hidden;
                scrollbar-width: none;
                -webkit-overflow-scrolling: touch;
                gap: 0;
                margin-bottom: 0.75rem;
                /* Fade edges */
                -webkit-mask-image: linear-gradient(to right, transparent 0%, black 5%, black 90%, transparent 100%);
                mask-image: linear-gradient(to right, transparent 0%, black 5%, black 90%, transparent 100%);
                padding: 0 0.5rem;
            }

            .filter-bar::-webkit-scrollbar { display: none; }

            .filter-btn {
                flex-shrink: 0;
                margin-right: 1.25rem;
                padding: 0.5rem 0;
                font-size: 0.6rem;
                /* Larger tap target */
                min-height: 40px;
                display: flex;
                align-items: center;
            }

            .archive-meta {
                margin-bottom: 0.4rem;
            }

            /* Nav: tighter on mobile */
            .site-nav-links li + li::before {
                width: 20px;
                margin: 0 0.75rem;
            }

            .site-nav-links a {
                font-size: 0.55rem;
            }

            .site-nav-divider {
                margin: 0 1rem;
            }

            .eyebrow-text {
                font-size: 0.65rem;
                letter-spacing: 0.3em;
            }
        }

        /* ── Small phones ── */
        @media (max-width: 430px) {
            .ui-layer {
                padding: 0 1rem;
                padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
            }

            .masking-text {
                font-size: 30vw;
            }

            .col-title {
                font-size: 1.05rem;
            }

            /* Hide ABOUT + CONTACT on very small screens, keep PROJECT + WORKS */
            .site-nav-links li:nth-child(3),
            .site-nav-links li:nth-child(4) {
                display: none;
            }

            .archive-item {
                padding: 0.875rem 0;
            }
        }
    </style>
</head>

                title: "토레스 EVX",
                category: "COMMERCIAL",
                year: "2023",
                role: "GAFFER",
                still: "./프로젝트 아카이브/토레스 EVX/Still1.jpg",
                displayTitle: "TORRES"
            },
            {
                id: "PAX-016",
                title: "셀파렉스 (차준환)",
                category: "COMMERCIAL",
                year: "2023",
                role: "GAFFER",
                still: "./프로젝트 아카이브/셀파렉스 루틴챌린지 (차준환)/Still1.png",
                displayTitle: "CELL"
            },
            {
                id: "PAX-017",
                title: "산주코루 홍보영상",
                category: "PRODUCTION",
                year: "2025",
                role: "FULL PROD.",
                still: "./프로젝트 아카이브/이자카야 산주코루 홍보영상/Still1.jpg",
                displayTitle: "IZAKAYA"
            },
            {
                id: "PAX-018",
                title: "풍류 행사 영상 스케치",
                category: "PRODUCTION",
                year: "2024",
                role: "FULL PROD.",
                still: "./프로젝트 아카이브/풍류 행사 영상 스케치/Still1.jpg",
                displayTitle: "PUNGNYU"
            }
        ];

        const archiveList = document.getElementById('archive-list');
        const bgLayer = document.getElementById('bg-layer');
        const displayTitle = document.getElementById('display-title');
        const displayCategory = document.getElementById('display-category');
        const archiveCount = document.getElementById('archive-count');
        const filterBar = document.getElementById('filter-bar');

        let activeIndex = -1;
        let currentFilter = 'ALL';

        const arrowSVG = `<svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>`;

        // Build background image plates (one per project)
        function buildBackgrounds() {
            projects.forEach((proj, index) => {
                const bgDiv = document.createElement('div');
                bgDiv.className = 'bg-image';
                if (proj.still) bgDiv.style.backgroundImage = `url("${proj.still}")`;
                bgDiv.id = `bg-${index}`;
                bgLayer.appendChild(bgDiv);
            });
        }

        function renderList(filter) {
            archiveList.innerHTML = '';
            activeIndex = -1;

            const filtered = projects.filter(p => filter === 'ALL' || p.category === filter);
            archiveCount.textContent = `${filtered.length} WORK${filtered.length !== 1 ? 'S' : ''}`;

            filtered.forEach((proj, i) => {
                const globalIndex = projects.indexOf(proj);
                const li = document.createElement('li');
                li.className = 'archive-item';
                li.dataset.globalIndex = globalIndex;
                li.innerHTML = `
                    <div class="col col-id">${proj.id}</div>
                    <div class="col col-title">${proj.title}</div>
                    <div class="col col-cat">${proj.category}</div>
                    <div class="col col-year">${proj.year}</div>
                    <div class="col col-format">${proj.role}</div>
                    <div class="col col-meta">${proj.category} · ${proj.year} · ${proj.role}</div>
                    <div class="col col-action">
                        <div class="icon-arrow-circle">${arrowSVG}</div>
                    </div>
                `;
                li.addEventListener('mouseenter', () => activateProject(globalIndex));

                // Touch: activate on tap + visual feedback
                li.addEventListener('touchstart', (e) => {
                    activateProject(globalIndex);
                    li.classList.add('touch-active');
                }, { passive: true });
                li.addEventListener('touchend', () => {
                    setTimeout(() => li.classList.remove('touch-active'), 300);
                }, { passive: true });

                archiveList.appendChild(li);
            });

            // Auto-activate first visible item
            if (filtered.length > 0) {
                setTimeout(() => activateProject(projects.indexOf(filtered[0])), 80);
            }
        }

        function activateProject(index) {
            if (index === activeIndex) return;
            activeIndex = index;
            const proj = projects[index];

            // Swap background
            document.querySelectorAll('.bg-image').forEach(bg => bg.classList.remove('active'));
            const bgEl = document.getElementById(`bg-${index}`);
            if (bgEl) bgEl.classList.add('active');

            // Animate display text
            displayTitle.classList.remove('animate-in');
            displayCategory.classList.remove('animate-in');
            void displayTitle.offsetWidth; // force reflow

            displayTitle.textContent = proj.displayTitle;
            displayCategory.textContent = proj.category + ' / ' + proj.year;

            displayTitle.classList.add('animate-in');
            displayCategory.classList.add('animate-in');
        }

        // Filter buttons
        filterBar.addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            currentFilter = btn.dataset.filter;
            renderList(currentFilter);
        });

        // Init
        buildBackgrounds();
        renderList('ALL');
    </script>
</body>
